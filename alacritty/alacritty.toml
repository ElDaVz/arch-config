[window]
opacity = 0.85
padding.x = 12
padding.y = 12
decorations = "none"

[font]
size = 12.0

[font.normal]
family = "InconsolataGo Nerd Font Mono"
style = "Regular"

[font.bold]
family = "InconsolataGo Nerd Font Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[colors.primary]
background = "#1e2030"
foreground = "#c8d3f5"

[colors.normal]
black   = "#1b1d2b"
red     = "#ff757f"
green   = "#c3e88d"
yellow  = "#ffc777"
blue    = "#82aaff"
magenta = "#c099ff"
cyan    = "#86e1fc"
white   = "#c8d3f5"