# Font
font_family      InconsolataGo Nerd Font Mono
bold_font        InconsolataGo Nerd Font Mono Bold
italic_font      InconsolataGo Nerd Font Mono Italic
font_size        12.0

# Transparency
background_opacity 0.85
dynamic_background_opacity yes

# Colors
background  #1e2030
foreground  #c8d3f5
selection_background #82aaff
selection_foreground #1e2030

# Black
color0  #1b1d2b
color8  #636d83

# Red
color1  #ff757f
color9  #ff757f

# Green
color2  #c3e88d
color10 #c3e88d

# Yellow
color3  #ffc777
color11 #ffc777

# Blue
color4  #82aaff
color12 #82aaff

# Magenta
color5  #c099ff
color13 #c099ff

# Cyan
color6  #86e1fc
color14 #86e1fc

# White
color7  #c8d3f5
color15 #c8d3f5

# Window
window_padding_width 12
hide_window_decorations yes
remember_window_size yes

# Cursor
cursor_shape beam
cursor_blink_interval 0.5

# Tab bar
tab_bar_style powerline
tab_powerline_style round
active_tab_foreground   #1e2030
active_tab_background   #82aaff
inactive_tab_foreground #636d83
inactive_tab_background #1e2030

# Misc
enable_audio_bell no

allow_remote_control yes
listen_on unix:/tmp/kitty